<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Splitwise Expense Tracker</h1>
        </header>
        <main>
            <section id="create-group-section">
                <h2>Create a New Group</h2>
                <form id="create-group-form">
                    <div class="form-group">
                        <label for="group-name">Group Name:</label>
                        <input type="text" id="group-name" name="group_name" required>
                    </div>
                    <div class="form-group">
                        <label for="group-members">Member Names (comma-separated):</label>
                        <input type="text" id="group-members" name="members" required>
                    </div>
                    <button type="submit">Create Group</button>
                </form>
                <p id="group-message" class="message"></p>
            </section>

            <section id="add-expense-section">
                <h2>Add an Expense</h2>
                <form id="add-expense-form">
                    <div class="form-group">
                        <label for="expense-group">Group Name:</label>
                        <input type="text" id="expense-group" name="group" required>
                    </div>
                    <div class="form-group">
                        <label for="payer">Paid by:</label>
                        <input type="text" id="payer" name="payer" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount:</label>
                        <input type="number" id="amount" name="amount" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="split-members">Split with (comma-separated):</label>
                        <input type="text" id="split-members" name="split_members" required>
                    </div>
                    <button type="submit">Add Expense</button>
                </form>
                <p id="expense-message" class="message"></p>
            </section>

            <section id="balances-section">
                <h2>View Balances</h2>
                <form id="get-balances-form">
                    <div class="form-group">
                        <label for="balance-group">Group Name:</label>
                        <input type="text" id="balance-group" name="group" required>
                    </div>
                    <button type="submit">Get Balances</button>
                </form>
                <div id="balances-result"></div>
                <p id="balance-message" class="message error"></p>
            </section>
        </main>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
